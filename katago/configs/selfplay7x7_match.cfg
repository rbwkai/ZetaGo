# ZetaGo 7x7 self-play via KataGo `match` (one net plays itself).
# 
# RULES ARE PINNED (single value each) to match the ZetaGo engine EXACTLY:
#   positional superko, area (Tromp-Taylor) scoring, no tax, suicide ILLEGAL, fixed komi 9.5.
# Do NOT use `rules = tromp-taylor` here -- that preset enables multi-stone suicide,
# which the engine forbids, and the mismatch would corrupt the dataset.

# Logs & data ----------------------------------------------------------------
logSearchInfo = false
logMoves = false
logGamesEvery = 100
logToStdout = true

# Bot (single net, self-play) ------------------------------------------------
numBots = 1
botName = zeta7
nnModelFile = katago/models/g170e-b10c128-s1141046784-d204142634.txt.gz
extraPairs = 0-0

# Match volume & parallelism --------------------------------------------------
numGameThreads = 12
numGamesTotal = 1000
maxMovesPerGame = 120

# Data output -----------------------------------------------------------------
dataBoardLen = 7
maxRowsPerTrainFile = 10000
maxDataQueueSize = 10000
firstFileRandMinProp = 0.0
switchNetsMidGame = false
initGamesWithPolicy = true
earlyForkGameProb = 0.0
earlyForkGameExpectedMoveProp = 0.75
sidePositionProb = 0.0

allowResignation = true
resignThreshold = -0.98
resignConsecTurns = 8

# Rules -- PINNED to match the engine -----------------------------------------
koRules = POSITIONAL
scoringRules = AREA
taxRules = NONE
multiStoneSuicideLegals = false
hasButtons = false

bSizes = 7
bSizeRelProbs = 1

komiAuto = false
komiMean = 9.5
handicapProb = 0.0
handicapCompensateKomiProb = 0.0

# Search -- LOW visits for CPU throughput -------------------------------------
maxVisits = 16
numSearchThreads = 1

# Opening diversity ----------------------------------------------------------
chosenMoveTemperatureEarly = 0.80
chosenMoveTemperatureHalflife = 12
chosenMoveTemperature = 0.10
compensateAfterPolicyInitProb = 1.0

# Neural net (CPU) ----------------------------------------------------------
nnMaxBatchSize = 32
nnCacheSizePowerOfTwo = 20
nnMutexPoolSizePowerOfTwo = 15
nnRandomize = true
numNNServerThreadsPerModel = 1
