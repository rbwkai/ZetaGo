# ZetaGo 7x7 self-play via KataGo `match` (one net plays itself).
#
# Usage:
#   katago/bin/katago match -config katago/configs/selfplay7x7_match.cfg \
#       -sgf-output-dir data/raw/sgf -log-file data/raw/match.log
#
# RULES ARE PINNED (single value each) to match the ZetaGo engine EXACTLY:
#   positional superko, area (Tromp-Taylor) scoring, no tax, suicide ILLEGAL, fixed komi 9.5.
# Do NOT use `rules = tromp-taylor` here -- that preset enables multi-stone suicide,
# which the engine forbids, and the mismatch would corrupt the dataset.

# Logs ----------------------------------------------------------------------
logSearchInfo = false
logMoves = false
logGamesEvery = 100
logToStdout = true

# Bot (single net, self-play) ----------------------------------------------
numBots = 1
botName = zeta7
nnModelFile = katago/models/g170e-b10c128-s1141046784-d204142634.txt.gz
# Make the one bot play itself (the match runner needs an explicit pairing).
extraPairs = 0-0

# Match volume / parallelism ------------------------------------------------
numGameThreads = 12        # parallel games; tune after benchmark
numGamesTotal = 100000     # request > 50k (cap with -override-config for the seed run)
maxMovesPerGame = 120      # 7x7 games are short

allowResignation = true
resignThreshold = -0.98
resignConsecTurns = 8

# Rules -- PINNED to match the engine ---------------------------------------
koRules = POSITIONAL
scoringRules = AREA
taxRules = NONE
multiStoneSuicideLegals = false
hasButtons = false

bSizes = 7
bSizeRelProbs = 1

komiAuto = false
komiMean = 9.5
handicapProb = 0.0
handicapCompensateKomiProb = 0.0

# Search -- LOW visits for CPU throughput -----------------------------------
maxVisits = 16
numSearchThreads = 1

# Opening diversity so games are not duplicates -----------------------------
chosenMoveTemperatureEarly = 0.80
chosenMoveTemperatureHalflife = 12
chosenMoveTemperature = 0.10

# Neural net (Eigen / pure CPU) ---------------------------------------------
nnMaxBatchSize = 32
nnCacheSizePowerOfTwo = 20
nnMutexPoolSizePowerOfTwo = 15
nnRandomize = true
numNNServerThreadsPerModel = 1
# numEigenThreadsPerModel defaults to numSearchThreads; raise to use more cores
# for the NN forward pass if the benchmark shows NN eval is the bottleneck.
